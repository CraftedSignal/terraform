name: Release

on:
  push:
    tags:
      - "gcp/v*"
      - "aws/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing provider-scoped tag to release, for example gcp/v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    env:
      TERRAFORM_VERSION: "1.15.7"
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Resolve package
        id: package
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            gcp/v*) echo "directory=gcp" >> "$GITHUB_OUTPUT" ;;
            aws/v*) echo "directory=aws" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unsupported provider-scoped tag: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - name: Ensure package exists
        run: test -d "${{ steps.package.outputs.directory }}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive "${{ steps.package.outputs.directory }}"

      - name: Validate platform module
        working-directory: ${{ steps.package.outputs.directory }}/modules/platform
        run: |
          terraform init -backend=false
          terraform validate

      - name: Validate production example
        working-directory: ${{ steps.package.outputs.directory }}/examples/production
        run: |
          terraform init -backend=false
          terraform validate

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$RELEASE_TAG" --verify-tag --generate-notes --title "$RELEASE_TAG"
