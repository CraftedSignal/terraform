name: Docs

on:
  pull_request:
    paths:
      - ".github/workflows/docs.yml"
      - "gcp/modules/platform/**/*.tf"
      - "gcp/modules/platform/README.md"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "gcp/modules/platform/**/*.tf"
      - "gcp/modules/platform/README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-docs:
    name: terraform-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify generated module docs
        uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
        with:
          working-dir: gcp/modules/platform
          output-file: README.md
          output-method: inject
          fail-on-diff: "true"
