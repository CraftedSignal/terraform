name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - ".tflint.hcl"
      - "gcp/**/*.tf"
      - "gcp/**/*.tfvars.example"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - ".tflint.hcl"
      - "gcp/**/*.tf"
      - "gcp/**/*.tfvars.example"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: "1.15.7"
  TFLINT_VERSION: "v0.63.1"

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gcp-platform-module
            directory: gcp/modules/platform
          - name: gcp-production-example
            directory: gcp/examples/production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive gcp

      - name: Init ${{ matrix.name }}
        working-directory: ${{ matrix.directory }}
        run: terraform init -backend=false

      - name: Validate ${{ matrix.name }}
        working-directory: ${{ matrix.directory }}
        run: terraform validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          tflint_version: ${{ env.TFLINT_VERSION }}
          cache: true

      - name: Show TFLint version
        run: tflint --version

      - name: Init TFLint plugins
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        run: tflint --recursive --config "$GITHUB_WORKSPACE/.tflint.hcl" -f compact
